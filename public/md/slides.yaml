  # ---------------------------------------------------------------------
  # Nur TechView — technischer Deep-Dive entlang des Data-Cycle:
  # Datenerhebung (SQL) → Bereinigung (Power Query M) → Datenmodell → Analyse (DAX).
  # Code refactored, Quelle: docs/dax-refactoring.md + docs/m-code-refactoring.md.
  - id: technical-approach
    nav_label: Technischer Ansatz
    slides:
      - id: tech-intro
        views: [techview]
        title: "Technischer Ansatz"
        subtitle: "Vier technische Arbeitsschritte bis zur vollständigen Analyse"
        content:
          - type: h_timeline
            items:
              - label: "Datenerhebung"
                text: "SQL Native Query — Gefiltert an der Quelle, nicht clientseitig nachgezogen"
              - label: "Datenbereinigung"
                text: "Power Query (M) — Zeit-Parsing als Funktion, die ≥5-Minuten-Regel an genau einer Stelle"
              - label: "Datenmodell"
                text: "Star Schema — Eine Faktentabelle, zwei Zeit-Dimensionen, Airline-Lookup und eine Measures-Tabelle"
              - label: "Datenanalyse"
                text: "DAX Measures — DIVIDE-sicher, Filterkontext bewusst genutzt"

      - id: tech-sql
        views: [techview]
        title: "Datenerhebung — SQL Native Query"
        subtitle: "Gefiltert an der Quelle, nicht clientseitig nachgezogen"
        content:
          - type: code
            layout: code_left
            items:
              - label: "PostgreSQL · Native Query (EnableFolding)"
                bullets:
                  - "Query Folding delegiert alle Filterungen und Berechnungen direkt an PostgreSQL."
                  - "Filterung an Quelle grenzt Zeitraum, LAX-Bezug und reguläre Flüge direkt beim Laden ein."
                  - "<code>EXTRACT(WEEK...)</code> berechnet die Kalenderwoche performant auf dem Datenbankserver."
                  - "<code>fl_direction</code> entsteht per <code>CASE</code> zur Unterscheidung von Ankunft und Abflug."
                  - "Rohdaten-Zeitstempel werden für spätere Typkonvertierungen in Power Query unverändert durchgereicht."
                  - "<code>ABS()</code> macht Verspätungen vorzeichenlos, wodurch Verfrühung und Verspätung gleichermaßen zählen."
                  - "<code>op_carrier</code> dient als Schlüssel für den späteren Tabellen-Join in Power Query."
                code: |
                  SELECT fl_date, EXTRACT(WEEK FROM fl_date) AS fl_week,
                         CASE WHEN dest   = 'LAX' THEN 'arrival'
                              WHEN origin = 'LAX' THEN 'departure' END AS fl_direction,
                         origin AS fl_origin,  dest AS fl_dest,
                         crs_dep_time AS raw_dep_crs, crs_arr_time AS raw_arr_crs,
                         dep_time AS raw_dep,         arr_time AS raw_arr,
                         ABS(dep_delay) AS delay_dep, ABS(arr_delay) AS delay_arr,
                         op_carrier
                  FROM flights
                  WHERE EXTRACT(YEAR FROM fl_date) BETWEEN 2015 AND 2017
                    AND (origin = 'LAX' OR dest = 'LAX')
                    AND cancelled = FALSE AND diverted = FALSE

      - id: tech-mcode
        views: [techview]
        title: "Datenbereinigung — Power Query (M)"
        subtitle: "Zeit-Parsing als Funktion, die ≥5-Minuten-Regel an genau einer Stelle"
        content:
          - type: code
            layout: code_left
            items:
              - label: "Power Query · M"
                bullets:
                  - "Zentrale Parse-Funktion verarbeitet vier Roh-Uhrzeiten effizient in einem Schritt statt über doppelte Copy-Paste-Blöcke."
                  - "Einheitliche Schwellenlogik steuert die 5-Minuten-Regel zentral in <code>fl_delay_status</code>, damit Definitionen nicht auseinanderdriften."
                  - "Abgeleitete Felder wie <code>delayed</code> nutzen die Ergebnisse von <code>fl_delay_status</code>, statt die Logik neu zu berechnen."
                code: |
                  // fnParseFlightTime — hhmm → time, einmal statt 4× kopiert
                  (raw) => let
                      _n = Text.PadStart(Text.From(raw), 4, "0") & "00"
                    in try #time(Number.FromText(Text.Start(_n, 2)),
                                 Number.FromText(Text.Middle(_n, 2, 2)), 0)
                       otherwise null

                  // ≥5-Minuten-Regel — genau eine Quelle der Wahrheit
                  fl_delay_status =
                    let d = if [fl_direction] = "arrival" then [delay_arr]
                                                          else [delay_dep]
                    in  if d >= 5 then [fl_direction] & " delay" else "on time"

                  delayed = [fl_delay_status] <> "on time"   // abgeleitet

      - id: tech-model
        views: [techview]
        title: "Datenmodell — Star Schema"
        subtitle: "Eine Faktentabelle, zwei Zeit-Dimensionen, Airline-Lookup und eine Measures-Tabelle"
        content:
          - type: chart_refs
            layout: image_left
            items:
              - label: "Power-BI-Datenmodell"
                source: "fLAirport-tables.png"
                caption: "Ein Star Schema: Die Trennung von Datum und Uhrzeit trägt die Zeitreihen."
                bullets:
                  - "<code>Report_Flights_Data</code>: Faktentabelle (1 Zeile = 1 Flug)"
                  - "<code>_Calendar</code>: Datumsebene (Jahr → Quartal → Monat → Woche → Tag)"
                  - "<code>_Time</code>: Tagesuhrzeit (Stunde) für die Tagesansicht"
                  - "<code>Origin_Unique_Carrieres</code>: Airline-Code → Klarname"
                  - "<code>_Measures</code>: eigene Tabelle für alle Kennzahlen"

      - id: tech-dax
        views: [techview]
        title: "Datenanalyse — DAX Measures"
        subtitle: "DIVIDE-sicher, Filterkontext bewusst genutzt"
        content:
          - type: code
            layout: code_left
            items:
              - label: "DAX · Measures"
                bullets:
                  - "Durchgehend <code>DIVIDE</code> garantiert eine fehlerfreie Division und fängt Berechnungsfehler durch Nullwerte automatisch ab."
                  - "Spezifischer Durchschnitt teilt bewusst nur durch verspätete Flüge, damit Pünktliche den Schnitt nicht senken."
                  - "Kombinierte Rang-Logik nutzt <code>RANKX</code> über <code>SUMX</code> zu <code>DIVIDE</code> für die exakte Berechnung der 3,51-%-Kernzahl."
                  - "Einheitliche Formatierung steuert über dieselbe Rangdefinition sowohl die Chart-Farbe als auch den finalen Prozentanteil."
                code: |
                  -- Ø-Verspätung: Summe / Anzahl der VERSPÄTETEN Flüge
                  avg_delay_value_total = DIVIDE([sum_delays_total], [cnt_total_delays])

                  otp_rate   = DIVIDE([cnt_total_ontimes], [cnt_total])   -- 29,85 %
                  delay_rate = DIVIDE([cnt_total_delays],  [cnt_total])   -- 70 %
                  delay_index = [delay_rate] * [avg_delay_value_total]    -- 18,54

                  -- Kernzahl 3,51 %: eine Rangquelle für Farbe UND Anteil
                  top3_avg_delay_value_in_pct =
                    DIVIDE(
                      SUMX(FILTER(VALUES(op_carrier_name), [top3_avg_ranking] <= 3),
                           [cnt_total_delays]),
                      [cnt_total_delays])

