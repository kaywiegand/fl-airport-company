# Schema (siehe wgnd-skills/project-case/build-pipeline.md, Abschnitt 1b):
#   chapters: Liste von Kapiteln. Jedes Kapitel hat id, nav_label, slides-Liste.
#   Jede Slide hat: id, views, role (optional: title/closing), title, subtitle, content
#     (content-items: figures, chart_refs, steps, sections, statement, agenda,
#      recommendations, links, box_grid, text_columns, ...).
#   view_composition: pro View die Kapitel-IDs in Anzeigereihenfolge.
#
# Stand 2026-07-21: Layout-Feedback-Runde 2 nach StoryView-Review (Titel/Closing L6/split,
# Agenda-Zentrierung, Bild-/Subline-Breiten, Insights-Box-Zeilen, Ergänzungen-Kapitel ans
# Ende vor Closing verschoben). Bild-Zuordnung time-*/kpi-*/airlines-* siehe PROCESS_LOG.
#
# TechView ist bewusst NICHT identisch mit StoryView — konsolidierte Auswahl statt aller
# Detail-Slides (siehe Kapitel "technical-approach": SQL/M/DAX-Platzhalter, BACKLOG #1).
# "Ergänzungen"-Kapitel (Airline-Detailcharts) ist nur in StoryView, nicht in TechView/Overview.

