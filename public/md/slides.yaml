              - heading: "Verspätungs-Anzahl Ranking"
                text: "Das reine Anzahl-Ranking (Southwest Airlines an der Spitze) zeigt ein anderes Bild als das Ø-Verspätungs-Ranking aus Kapitel 'Analyse Verspätungen' (Envoy Air an der Spitze) — bestätigt noch einmal, dass die Rangfolge stark vom gewählten Indikator abhängt."
              - heading: "Delay Index und Delay Rate"
                text: "Delay Index (Ø 19,23) und Delay Rate (Ø 71,33 %) kombinieren Häufigkeit und Schwere zu je einer Kennzahl — genau die Art Kombinationsindikator, die die Empfehlung 'Indikator verbessern' fordert."

