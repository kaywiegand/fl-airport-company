  headline_kpis_from: projektrahmen-cover
  tagline: "Analyse unpünktlicher Flüge — Los Angeles International Airport"
  subtitle: "Power BI Business Intelligence Case"
  footer_tagline: "Pünktlichkeitsanalyse & Handlungsempfehlungen für fLAirport"
  about:
    - label: "Motivation"
      text: "fLAirport braucht für sein größtes Drehkreuz LAX eine abteilungsübergreifende Diskussionsgrundlage zur Pünktlichkeit — als Basis für Führungskräfte-Entscheidungen."
    - label: "Kernfrage"
      text: "Welche Airlines und welche Zeiträume treiben die Unpünktlichkeit? <strong>Der naheliegende Indikator täuscht</strong> — die drei Airlines mit der höchsten Ø-Verspätung pro Flug stehen für nur 3,51 % aller Verspätungen."
    - label: "Erkenntnis"
      text: "Entscheidend sind stattdessen die klar wiederkehrenden saisonalen (Anstieg Q2, Peak Q3) und wochentäglichen Muster (Samstag = Minimum, Morgen-/Nachmittags-Peaks)."
    - label: "Ergebnisse"
      text: "70 % aller 1.264.229 Flüge (2015–2017) sind unpünktlich, On-Time Performance 29,85 %. Drei konkrete Handlungsempfehlungen: operative Planung, Ursachenforschung, besserer Indikator."
    - label: "Data Cycle"
      text: "SQL (PostgreSQL) → Power Query (M) → DAX Measures → Power BI Report → Management-Präsentation."
