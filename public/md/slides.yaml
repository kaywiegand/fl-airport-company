              - category: "Research fortführen"
                title: "Ursachen extremer Ausreißer klären"
                points:
                  - "Es lassen sich teils extreme Spitzen in der Anzahl und der Summe der Verspätungen erkennen. Die Auslöser sollten aufgeklärt werden, um Wiederholungen zu vermeiden."
          - type: box_grid
            items:
              - "→ Informationen teilen und berücksichtigen"
              - "→ Erkundigungen bei Fachabteilungen einholen"

      - id: empfehlungen-indikator
        views: [storyview, overview]
        title: "Handlungsempfehlungen"
        subtitle: "Drei konkrete Hebel für Planung, Ursachenforschung und Messung"
        content:
          - type: recommendations
            items:
              - category: "Indikator verbessern"
                title: "Einen gewichteten Leistungsindikator ergänzen"
                points:
                  - "Durchschnittliche Verspätung pro Flug zeigt die Schwere der Verspätung, nicht die Häufigkeit und den Einfluss auf den Gesamtflugverkehr."
                  - "Ein gewichteter Leistungsindikator (Weighted KPI) hingegen kombiniert diese Faktoren zu einer Gesamtaussage."
          - type: box_grid
            items:
              - "→ Identifikation geeigneter Indikatoren<br><br>Sinnvolle Metriken für den Überblick der Häufigkeit und Intensität:<ul><li>OTP & Summe Verspätungen</li><li>Anzahl & Summe Verspätungen</li><li>Delay-Index Airlines</li></ul>"

  # ---------------------------------------------------------------------
